<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>...</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Quicksand:wght@400;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            font-family: 'Quicksand', sans-serif;
            overflow-x: hidden;
            position: relative;
        }

        /* Background floating hearts */
        .heart {
            position: fixed;
            top: -10%;
            font-size: 20px;
            color: rgba(255, 255, 255, 0.6);
            animation: floatHeart linear infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes floatHeart {
            0% {
                transform: translateY(0) rotate(0deg) scale(0.5);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(110vh) rotate(360deg) scale(1.2);
                opacity: 0;
            }
        }

        /* Confetti */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            top: -10px;
            animation: confettiFall linear infinite;
            pointer-events: none;
            z-index: 2;
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        .petal {
            position: fixed;
            top: -10%;
            z-index: 90;
            pointer-events: none;
            opacity: 0.85;
            animation-name: petalFall;
            animation-timing-function: linear;
            animation-fill-mode: forwards;
        }

        @keyframes petalFall {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.85;
            }
            100% {
                transform: translateY(110vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Gift Box Overlay */
        .gift-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .gift-overlay.hidden {
            opacity: 0;
            transform: scale(1.2);
            pointer-events: none;
        }

        .gift-box {
            width: 120px;
            height: 120px;
            animation: giftFloat 3s ease-in-out infinite;
            filter: drop-shadow(0 10px 30px rgba(214, 51, 132, 0.4));
            transition: transform 0.3s ease;
            object-fit: contain;
        }

        .gift-overlay:hover .gift-box {
            transform: scale(1.1);
        }

        @keyframes giftFloat {
            0%, 100% {
                transform: translateY(0) rotate(-2deg);
                filter: drop-shadow(0 10px 30px rgba(214, 51, 132, 0.4));
            }
            50% {
                transform: translateY(-25px) rotate(2deg);
                filter: drop-shadow(0 35px 30px rgba(214, 51, 132, 0.25));
            }
        }

        .gift-text {
            margin-top: 30px;
            font-family: 'Dancing Script', cursive;
            font-size: clamp(1.8rem, 6vw, 2.5rem);
            color: #d63384;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            animation: giftTextPulse 2s ease-in-out infinite;
        }

        @keyframes giftTextPulse {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.8;
                transform: scale(1.05);
            }
        }

        /* Scenes */
        .scene {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            padding: 20px;
            transition: opacity 0.8s ease;
        }

        .scene.active {
            display: flex;
        }

        .scene.fade-out {
            animation: fadeOut 0.8s ease forwards;
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }

        /* Scene 1: Birthday Text */
        .scene-birthday {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
        }

        .birthday-content {
            position: relative;
            display: inline-block;
            margin-bottom: 40px;
        }

        .typewriter-text {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(2.5rem, 12vw, 6rem);
            color: #d63384;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.05em;
            line-height: 1.2;
            text-align: center;
        }

        .typewriter-char {
            opacity: 0;
            transform: translateY(30px) scale(0.5);
            display: inline-block;
            min-width: 0.3em;
        }

        .typewriter-char.show {
            animation: charAppear 0.5s ease forwards;
        }

        @keyframes charAppear {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.5);
            }
            60% {
                transform: translateY(-5px) scale(1.1);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes hatBounce {
            0%, 100% {
                transform: translateY(0) rotate(-10deg);
            }
            50% {
                transform: translateY(-15px) rotate(10deg);
            }
        }

        .btn-open-letter {
            padding: 16px 50px;
            font-size: clamp(1rem, 4vw, 1.3rem);
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #ff6b9d, #d63384);
            color: white;
            cursor: pointer;
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(214, 51, 132, 0.4);
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
        }

        .btn-open-letter.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
            transition: all 0.6s ease;
            position: relative;
            animation: btnFloat 2s ease-in-out infinite;
        }

        @keyframes btnFloat {
            0%, 100% { top: 0; }
            50% { top: -10px; }
        }

        .btn-open-letter:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 30px rgba(214, 51, 132, 0.6);
        }

        .birth-date-sub {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(1.5rem, 6vw, 2.5rem);
            color: #ff6b9d;
            text-align: center;
            margin-top: 10px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.6s ease;
        }

        .birth-date-sub.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .scene-birthday.moved-up .birthday-content {
            transition: transform 0.8s ease;
            transform: translateY(-18vh);
            position: relative;
            z-index: 70;
        }

        .scene-birthday.moved-up .btn-open-letter {
            transition: transform 0.8s ease;
            transform: translateY(-18vh);
            position: relative;
            z-index: 70;
        }

        .love-content {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            animation: loveAppear 0.8s ease forwards;
        }

        .love-content.visible {
            display: flex;
            position: absolute;
            top: 50%;
            transform: translateX(-50%);
        }

        .love-photo {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 4px solid #ff6b9d;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            background: linear-gradient(135deg, #ffecd2, #fcb69f);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
        }

        .love-name {
            display: inline-block;
            padding: 12px 35px;
            background: linear-gradient(135deg, #ff6b9d, #d63384);
            color: white;
            border-radius: 50px;
            font-family: 'Dancing Script', cursive;
            font-size: clamp(1.3rem, 5vw, 2rem);
            font-weight: 700;
            box-shadow: 0 5px 15px rgba(214, 51, 132, 0.4);
            animation: nameAppear 0.6s ease forwards;
            animation-delay: 0.3s;
            opacity: 0;
        }

        @keyframes loveAppear {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.9);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes nameAppear {
            0% {
                opacity: 0;
                transform: translateY(10px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Birth Date Overlay */
        .birth-date-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 154, 158, 0.95);
            z-index: 60;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .birth-date-overlay.active {
            display: flex;
            animation: dateAppear 0.6s ease forwards;
        }

        .birth-date-overlay.fade-out {
            animation: fadeOut 0.8s ease forwards;
        }

        @keyframes dateAppear {
            0% {
                opacity: 0;
                transform: scale(0.5);
            }
            60% {
                transform: scale(1.05);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .birth-date-box {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(4rem, 18vw, 10rem);
            color: white;
            text-shadow: 3px 3px 10px rgba(0,0,0,0.2);
            font-weight: 700;
            letter-spacing: 5px;
        }

        .birth-date-label {
            font-size: clamp(1rem, 4vw, 1.5rem);
            color: rgba(255,255,255,0.9);
            margin-top: 15px;
            font-weight: 600;
        }

        /* Letter Overlay */
        .letter-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 154, 158, 0.92);
            z-index: 65;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .letter-overlay.active {
            display: flex;
            animation: letterAppear 0.6s ease forwards;
        }

        .letter-overlay.fade-out {
            animation: fadeOut 0.8s ease forwards;
        }

        @keyframes letterAppear {
            0% {
                opacity: 0;
                transform: scale(0.8);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .letter-card {
            background: #fffef5;
            border: 1px solid #e8d5d5;
            border-radius: 4px;
            padding: 40px 35px 35px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.08);
            text-align: left;
            animation: cardSlide 0.8s ease forwards;
            position: relative;
        }

        .letter-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 8px;
            background: linear-gradient(90deg, #ff9a9e, #d63384, #ff9a9e);
            border-radius: 4px 4px 0 0;
        }

        .letter-seal {
            position: absolute;
            top: -18px;
            right: 25px;
            font-size: 2.2rem;
            filter: drop-shadow(0 3px 5px rgba(0,0,0,0.15));
            z-index: 10;
        }

        @keyframes cardSlide {
            0% {
                opacity: 0;
                transform: translateY(30px) rotate(-1deg);
            }
            100% {
                opacity: 1;
                transform: translateY(0) rotate(0deg);
            }
        }

        .letter-title {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(1.6rem, 5vw, 2.3rem);
            color: #d63384;
            margin-bottom: 22px;
            text-align: center;
            border-bottom: 1px dashed #f0c0c0;
            padding-bottom: 12px;
            opacity: 0;
        }

        .letter-text p {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(0.95rem, 3.5vw, 1.15rem);
            color: #444;
            line-height: 2;
            font-family: 'Quicksand', sans-serif;
            margin-bottom: 14px;
            text-indent: 20px;
            opacity: 0;
        }

        .letter-signature {
            opacity: 0;
            margin-top: 30px;
            text-align: right;
            font-family: 'Dancing Script', cursive;
            font-size: clamp(1.2rem, 4vw, 1.6rem);
            color: #d63384;
        }

        /* Responsive */
        @media (max-width: 400px) {
            .gift-box {
                width: 90px;
                height: 90px;
            }
        }
    </style>
</head>
<body>
    <div class="gift-overlay" id="giftOverlay" onclick="openGift()">
        <img class="gift-box" src="https://www.emojiall.com/images/240/microsoft/windows-11-24h2-august-2025-update/1f381.png" alt="Gift Box">
        <div class="gift-text">Nhấn để mở quà</div>
    </div>

    <div class="scene scene-birthday" id="sceneBirthday">
        <div class="birthday-content">
            <div class="typewriter-text" id="typewriterText"></div>
            <div class="birth-date-sub" id="birthDateSub">22 - 4</div>
        </div>
        <button class="btn-open-letter" id="btnOpenLetter" onclick="showBirthDate()">Mở thư 💌</button>
        <div class="love-content" id="loveContent">
            <div class="love-photo">🤡</div>
            <div class="love-name" id="loveName"></div>
        </div>
    </div>

    <div class="letter-overlay" id="letterOverlay">
        <div class="letter-card">
            <div class="letter-seal">💌</div>
            <div class="letter-title">hello 💌</div>
            <div class="letter-text">
                <p>hello</p>
                <p>hello</p>
                <p>hello</p>
            </div>
            <div class="letter-signature">hello! 💕</div>
        </div>
    </div>

    <div class="birth-date-overlay" id="birthDateOverlay">
        <div class="birth-date-box">22 - 04</div>
        <div class="birth-date-label">hello</div>
    </div>

    <div id="hearts-container"></div>
    <div id="confetti-container"></div>

    <script>
        function createHearts() {
            const container = document.getElementById('hearts-container');
            const heartSymbols = ['💖', '💕', '💗', '💓', '💝', '❤️', '🧡', '💛'];
            
            setInterval(() => {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.textContent = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
                heart.style.left = Math.random() * 100 + '%';
                heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
                heart.style.animationDuration = (Math.random() * 5 + 5) + 's';
                container.appendChild(heart);
                
                setTimeout(() => {
                    heart.remove();
                }, 10000);
            }, 800);
        }

        function createConfetti() {
            const container = document.getElementById('confetti-container');
            const colors = ['#ff6b9d', '#d63384', '#ff9a9e', '#fecfef', '#ffd93d', '#6bcb77', '#4d96ff'];
            
            setInterval(() => {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                confetti.style.width = (Math.random() * 8 + 5) + 'px';
                confetti.style.height = (Math.random() * 8 + 5) + 'px';
                confetti.style.animationDuration = (Math.random() * 3 + 4) + 's';
                container.appendChild(confetti);
                
                setTimeout(() => {
                    confetti.remove();
                }, 7000);
            }, 300);
        }

        function openGift() {
            const overlay = document.getElementById('giftOverlay');
            overlay.classList.add('hidden');
            
            for (let i = 0; i < 80; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.backgroundColor = ['#ff6b9d', '#d63384', '#ffd93d', '#ff9a9e', '#6bcb77', '#4d96ff'][Math.floor(Math.random() * 6)];
                    confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                    confetti.style.width = (Math.random() * 10 + 5) + 'px';
                    confetti.style.height = (Math.random() * 10 + 5) + 'px';
                    confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
                    document.getElementById('confetti-container').appendChild(confetti);
                    setTimeout(() => confetti.remove(), 4000);
                }, i * 30);
            }
            
            setTimeout(() => {
                overlay.style.display = 'none';
                startBirthdayScene();
                createPetals();
            }, 800);
        }

        function startBirthdayScene() {
            const scene = document.getElementById('sceneBirthday');
            const twText = document.getElementById('typewriterText');
            const btn = document.getElementById('btnOpenLetter');
            const text = 'Happy Birthday!';
            
            scene.classList.add('active');
            twText.innerHTML = '';
            
            text.split('').forEach((char, index) => {
                const span = document.createElement('span');
                span.className = 'typewriter-char';
                span.textContent = char === ' ' ? '\u00A0' : char;
                twText.appendChild(span);
                
                setTimeout(() => {
                    span.classList.add('show');
                }, 100 + index * 150);
            });
            
            const btnDelay = text.length * 150 + 800;
            setTimeout(() => {
                btn.classList.add('visible');
                document.getElementById('birthDateSub').classList.add('visible');
            }, btnDelay);
            
            setTimeout(() => {
                scene.classList.add('moved-up');
            }, btnDelay + 1500);
            
            setTimeout(() => {
                document.getElementById('loveContent').classList.add('visible');
                typeName();
            }, btnDelay + 2500);
        }

        function showBirthDate() {
            const dateOverlay = document.getElementById('birthDateOverlay');
            
            setTimeout(() => {
                dateOverlay.classList.add('active');
            }, 400);
            
            setTimeout(() => {
                dateOverlay.classList.add('fade-out');
                
                setTimeout(() => {
                    dateOverlay.style.display = 'none';
                    const letterOverlay = document.getElementById('letterOverlay');
                    letterOverlay.classList.add('active');
                    typeLetter();
                }, 800);
            }, 3000);
        }

        function typeName() {
            const nameEl = document.getElementById('loveName');
            const name = 'Nguyễn Hà Chi';
            nameEl.innerHTML = '';
            name.split('').forEach((char, index) => {
                const span = document.createElement('span');
                span.textContent = char === ' ' ? '\u00A0' : char;
                span.style.opacity = '0';
                nameEl.appendChild(span);
                setTimeout(() => {
                    span.style.opacity = '1';
                    span.style.transition = 'opacity 0.15s ease';
                }, index * 200);
            });
        }

        function typeLetter() {
            const elements = [
                document.querySelector('.letter-title'),
                ...document.querySelectorAll('.letter-text p'),
                document.querySelector('.letter-signature')
            ];
            
            let totalDelay = 300;
            
            elements.forEach(el => {
                if (!el) return;
                const text = el.textContent;
                el.innerHTML = '';
                el.style.opacity = '1';
                text.split('').forEach((char, i) => {
                    const span = document.createElement('span');
                    span.textContent = char === ' ' ? '\u00A0' : char;
                    span.style.opacity = '0';
                    el.appendChild(span);
                    setTimeout(() => {
                        span.style.opacity = '1';
                        span.style.transition = 'opacity 0.05s ease';
                    }, totalDelay + i * 40);
                });
                totalDelay += text.length * 40 + 200;
            });
        }

        function createPetals() {
            const container = document.getElementById('confetti-container');
            const petals = ['🌸', '🌺', '🌷', '💮', '🏵️', '❤️', '💖', '💕'];
            setInterval(() => {
                const petal = document.createElement('div');
                petal.className = 'petal';
                petal.textContent = petals[Math.floor(Math.random() * petals.length)];
                petal.style.left = Math.random() * 100 + '%';
                petal.style.fontSize = (Math.random() * 15 + 15) + 'px';
                petal.style.animationDuration = (Math.random() * 6 + 6) + 's';
                container.appendChild(petal);
                setTimeout(() => petal.remove(), 12000);
            }, 500);
        }

        createConfetti();
    </script>
</body>
</html>
